name: Publish to NuGet

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build, Pack, and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # enable GitHub OIDC token issuance for this job

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build solution
      run: dotnet build './mcpservers - Solution.sln' -c Release

    - name: Pack projects
      run: dotnet pack './mcpservers - Solution.sln' -c Release --no-build -o ./packages

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push mcpclient to NuGet
      run: dotnet nuget push "**/packages/mcpclient.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source "https://api.nuget.org/v3/index.json" --skip-duplicate

    - name: Push mcpserver projects to NuGet
      run: dotnet nuget push "**/packages/mcpserver.*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source "https://api.nuget.org/v3/index.json" --skip-duplicate

    - name: Push ModelContextProtocolServer projects to NuGet
      run: dotnet nuget push "**/packages/ModelContextProtocolServer.*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source "https://api.nuget.org/v3/index.json" --skip-duplicate